<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#0f1923"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CardioRec"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>CardioRec</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f1923;
  --surface: #162130;
  --surface2: #1d2d3e;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8edf2;
  --text2: #8a9bb0;
  --text3: #4d6070;
  --accent: #00c896;
  --accent-dim: rgba(0,200,150,0.12);
  --accent-dim2: rgba(0,200,150,0.25);
  --red: #e2534a;
  --red-dim: rgba(226,83,74,0.12);
  --amber: #f0a030;
  --amber-dim: rgba(240,160,48,0.12);
  --blue: #3d9be9;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overscroll-behavior: none; }

body { display: flex; flex-direction: column; min-height: 100vh; }

.app { flex: 1; display: flex; flex-direction: column; max-width: 540px; margin: 0 auto; width: 100%; padding: 0 0 env(safe-area-inset-bottom); }

/* HEADER */
.header { padding: 20px 20px 0; display: flex; align-items: flex-end; justify-content: space-between; }
.logo { font-family: 'Fraunces', serif; font-weight: 300; font-size: 26px; color: var(--text); letter-spacing: -0.02em; }
.logo span { color: var(--accent); font-style: italic; }
.settings-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 16px; transition: background 0.2s; }
.settings-btn:hover { background: var(--surface2); }

/* MODE SELECTOR */
.mode-wrap { padding: 20px 20px 0; }
.mode-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mode-tab { padding: 12px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); cursor: pointer; text-align: center; transition: all 0.2s; }
.mode-tab.active { border-color: var(--accent); background: var(--accent-dim); }
.mode-tab-icon { font-size: 20px; margin-bottom: 4px; }
.mode-tab-label { font-size: 11px; color: var(--text2); letter-spacing: 0.05em; }
.mode-tab.active .mode-tab-label { color: var(--accent); }

/* RECORDER CARD */
.recorder-card { margin: 16px 20px 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }

/* VISUALIZER */
.viz-wrap { height: 64px; display: flex; align-items: center; justify-content: center; gap: 2px; margin-bottom: 16px; }
.viz-bar { width: 3px; border-radius: 2px; background: var(--border2); transition: height 0.05s ease, background 0.3s; min-height: 4px; }
.viz-bar.active { background: var(--accent); }

/* TIMER */
.timer-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.timer { font-family: 'Fraunces', serif; font-size: 48px; font-weight: 300; letter-spacing: -0.03em; color: var(--text); }
.status-pill { font-size: 11px; padding: 5px 12px; border-radius: 99px; letter-spacing: 0.08em; font-weight: 500; }
.status-idle { background: var(--surface2); color: var(--text3); }
.status-recording { background: var(--red-dim); color: var(--red); }
.status-paused { background: var(--amber-dim); color: var(--amber); }
.status-processing { background: var(--accent-dim); color: var(--accent); }

/* CONTROLS */
.controls { display: flex; gap: 10px; }
.btn-rec { flex: 1; height: 52px; border-radius: var(--radius-sm); border: none; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-main { background: var(--accent); color: #0f1923; }
.btn-main:hover { filter: brightness(1.1); }
.btn-main:active { transform: scale(0.97); }
.btn-main:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; transform: none; filter: none; }
.btn-sec { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-sec:hover { border-color: var(--border2); color: var(--text); }
.btn-sec:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-sq { width: 52px; height: 52px; flex: none; border-radius: var(--radius-sm); background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.btn-sq:hover { border-color: var(--border2); }
.btn-sq:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-sq.danger { color: var(--red); border-color: rgba(226,83,74,0.3); }

/* WAKE LOCK indicator */
.wakelock-row { margin-top: 10px; display: flex; align-items: center; gap: 6px; }
.wl-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.wl-dot.on { background: var(--accent); }
.wl-label { font-size: 10px; color: var(--text3); letter-spacing: 0.05em; }

/* SEGMENTS */
.segments-wrap { margin: 12px 20px 0; }
.seg-header { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 8px; }
.seg-list { display: flex; flex-direction: column; gap: 6px; max-height: 120px; overflow-y: auto; }
.seg-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; display: flex; align-items: center; gap: 8px; font-size: 11px; }
.seg-num { color: var(--text3); min-width: 20px; }
.seg-text { flex: 1; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.seg-status { font-size: 10px; padding: 2px 8px; border-radius: 99px; }
.seg-ok { background: var(--accent-dim); color: var(--accent); }
.seg-pending { background: var(--amber-dim); color: var(--amber); }
.seg-error { background: var(--red-dim); color: var(--red); }
.seg-retry { background: rgba(240,160,48,0.2); color: var(--amber); border: 1px solid rgba(240,160,48,0.4); }

/* TRANSCRIPTION */
.section { margin: 12px 20px 0; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; }
.section-actions { display: flex; gap: 6px; }
.btn-small { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.15s; }
.btn-small:hover { border-color: var(--border2); color: var(--text); }
.btn-small.primary { border-color: rgba(0,200,150,0.4); color: var(--accent); background: var(--accent-dim); }
.btn-small.primary:hover { background: var(--accent-dim2); }
.btn-small:disabled { opacity: 0.4; cursor: not-allowed; }

.text-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 12px; line-height: 1.8; color: var(--text); min-height: 100px; max-height: 180px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
.text-box.empty { color: var(--text3); font-style: italic; }

/* HCOP OUTPUT */
.hcop-box { background: var(--surface); border: 1px solid rgba(0,200,150,0.2); border-radius: var(--radius-sm); padding: 14px; font-size: 12px; line-height: 1.9; color: var(--text); min-height: 120px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
.hcop-box.empty { color: var(--text3); font-style: italic; border-color: var(--border); }
.hcop-box.loading { color: var(--text2); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* CÁLCULOS AUTOMÁTICOS */
.calcs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.calc-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
.calc-name { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; margin-bottom: 4px; }
.calc-val { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 300; color: var(--text); letter-spacing: -0.02em; }
.calc-unit { font-size: 12px; color: var(--text2); margin-left: 3px; }
.calc-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; margin-top: 5px; letter-spacing: 0.04em; }
.badge-ok    { background: var(--accent-dim); color: var(--accent); }
.badge-warn  { background: var(--amber-dim); color: var(--amber); }
.badge-alert { background: var(--red-dim); color: var(--red); }

/* SETTINGS PANEL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: flex-end; }
.overlay.open { display: flex; }
.settings-panel { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; border-top: 1px solid var(--border); padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); width: 100%; max-height: 85vh; overflow-y: auto; animation: slideUp 0.25s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.settings-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; margin-bottom: 20px; }
.field { margin-bottom: 16px; }
.field-label { font-size: 11px; color: var(--text2); letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; padding: 10px 12px; outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field select, .field textarea:focus { border-color: var(--border2); }
.field select { appearance: none; }
.field textarea { min-height: 100px; resize: vertical; line-height: 1.6; }
.field select option { background: var(--surface2); }
.settings-save { width: 100%; height: 48px; background: var(--accent); color: #0f1923; border: none; border-radius: var(--radius-sm); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 8px; letter-spacing: 0.04em; }

/* BOTTOM SPACER */
.spacer { height: 24px; }

/* COPY TOAST */
.toast { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #0f1923; font-size: 12px; padding: 8px 20px; border-radius: 99px; opacity: 0; transition: all 0.3s; pointer-events: none; font-weight: 500; letter-spacing: 0.04em; z-index: 200; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">Cardio<span>Rec</span></div>
    <div class="settings-btn" onclick="openSettings()">⚙</div>
  </div>

  <div class="mode-wrap">
    <div class="mode-tabs">
      <div class="mode-tab active" id="tab-consulta" onclick="setMode('consulta')">
        <div class="mode-tab-icon">🎙</div>
        <div class="mode-tab-label">CONSULTA COMPLETA</div>
      </div>
      <div class="mode-tab" id="tab-dictado" onclick="setMode('dictado')">
        <div class="mode-tab-icon">📋</div>
        <div class="mode-tab-label">DICTADO POST-CONSULTA</div>
      </div>
    </div>
  </div>

  <div class="recorder-card">
    <div class="viz-wrap" id="vizWrap"></div>

    <div class="timer-row">
      <div class="timer" id="timer">00:00</div>
      <div class="status-pill status-idle" id="statusPill">LISTO</div>
    </div>

    <div class="controls">
      <button class="btn-rec btn-main" id="btnStart" onclick="startRec()">⬤ GRABAR</button>
      <button class="btn-sq" id="btnPause" onclick="togglePause()" disabled title="Pausar">⏸</button>
      <button class="btn-sq danger" id="btnStop" onclick="stopRec()" disabled title="Detener">⏹</button>
    </div>

    <div class="wakelock-row">
      <div class="wl-dot" id="wlDot"></div>
      <div class="wl-label" id="wlLabel">PANTALLA ACTIVA: INACTIVO</div>
    </div>
  </div>

  <div class="segments-wrap" id="segmentsWrap" style="display:none">
    <div class="seg-header">SEGMENTOS TRANSCRITOS</div>
    <div class="seg-list" id="segList"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-label">TRANSCRIPCIÓN</div>
      <div class="section-actions">
        <button class="btn-small" onclick="copyText('transcBox')">copiar</button>
        <button class="btn-small primary" id="btnAnalyze" onclick="analyzeWithClaude()" disabled>→ HCOP</button>
      </div>
    </div>
    <div class="text-box empty" id="transcBox">La transcripción aparecerá aquí...</div>
  </div>

  <div class="section" id="calcsWrap" style="display:none">
    <div class="section-header">
      <div class="section-label">CÁLCULOS AUTOMÁTICOS</div>
    </div>
    <div class="calcs-grid" id="calcsGrid"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-label">HCOP — CLAUDE</div>
      <div class="section-actions">
        <button class="btn-small" onclick="shareHCOP('whatsapp')" title="Compartir por WhatsApp">WhatsApp</button>
        <button class="btn-small" onclick="shareHCOP('mail')" title="Enviar por mail">mail</button>
        <button class="btn-small" onclick="copyText('hcopBox')">copiar</button>
        <button class="btn-small" onclick="clearHcop()">limpiar</button>
      </div>
    </div>
    <div class="hcop-box empty" id="hcopBox">El HCOP generado por Claude aparecerá aquí...</div>
  </div>

  <div class="spacer"></div>
</div>

<!-- SETTINGS OVERLAY -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="settings-panel">
    <div class="settings-title">Configuración</div>

    <div class="field">
      <label class="field-label">API KEY — ANTHROPIC (CLAUDE)</label>
      <input type="password" id="cfgAnthropic" placeholder="sk-ant-..."/>
    </div>

    <div class="field">
      <label class="field-label">MÉTODO DE TRANSCRIPCIÓN</label>
      <select id="cfgMethod" onchange="onMethodChange()">
        <option value="whisper">Whisper (OpenAI) — mejor precisión</option>
        <option value="native">Web Speech — gratuito, sin API</option>
      </select>
    </div>

    <div class="field" id="openaiField">
      <label class="field-label">API KEY — OPENAI (WHISPER)</label>
      <input type="password" id="cfgOpenai" placeholder="sk-..."/>
    </div>

    <div class="field">
      <label class="field-label">PROMPT — CONSULTA COMPLETA</label>
      <textarea id="cfgPromptConsulta">Sos un asistente médico clínico. Transcribiste una consulta cardiológica completa. Formatéala como historia clínica en primera persona del médico, sin viñetas, sin flechas, sin íconos. Secciones: motivo de consulta, antecedentes relevantes mencionados, medicación actual, examen físico si se describe, impresión diagnóstica, plan terapéutico. Si hay datos de laboratorio, usá formato HCLAB: una sola línea, abreviaturas, sin unidades, valores anormales en **negrita**, sin índices eritrocitarios ni serie blanca. Omití secciones sin datos. Texto listo para copiar a historia clínica.</textarea>
    </div>

    <div class="field">
      <label class="field-label">PROMPT — DICTADO POST-CONSULTA</label>
      <textarea id="cfgPromptDictado">Sos un asistente médico. El médico dictó un resumen libre de una consulta cardiológica. Convertilo en una evolución clínica en primera persona, sin viñetas, sin flechas, sin íconos, lista para copiar a la historia clínica. Incluí: motivo de consulta o control, hallazgos clínicos relevantes, medicación mencionada, plan. Si hay datos de laboratorio, usá formato HCLAB: una sola línea, abreviaturas, sin unidades, valores anormales en **negrita**. Omití lo que no se mencione. Redactá de forma fluida y profesional.</textarea>
    </div>

    <div class="field">
      <label class="field-label">DICCIONARIO FONÉTICO (una corrección por línea: error → correcto)</label>
      <textarea id="cfgDiccionario" style="min-height:80px" placeholder="cipar → CPAP&#10;arneas → apneas&#10;metil → metoprolol"></textarea>
    </div>

    <button class="settings-save" onclick="saveSettings()">Guardar configuración</button>
    <button class="settings-save" style="margin-top:8px;background:var(--surface2);color:var(--text2);border:1px solid var(--border)" onclick="resetPrompts()">Restaurar prompts por defecto</button>
  </div>
</div>

<div class="toast" id="toast">Copiado</div>

<script>
const N_BARS = 28;
const vizWrap = document.getElementById('vizWrap');
let bars = [];
for (let i = 0; i < N_BARS; i++) {
  const b = document.createElement('div');
  b.className = 'viz-bar';
  b.style.height = '4px';
  vizWrap.appendChild(b);
  bars.push(b);
}

let mode = 'consulta';
let isRecording = false;
let isPaused = false;
let seconds = 0;
let timerInterval = null;
let mediaRecorder = null;
let stream = null;
let audioChunks = [];
let allChunks = [];
let audioContext = null;
let analyserNode = null;
let animFrame = null;
let wakeLock = null;
let segmentInterval = null;
let recognition = null;
let transcriptionText = '';
let segmentCount = 0;
let segments = [];
let segRetryTimers = {};

const MAX_RETRIES = 3;
const RETRY_DELAYS = [8000, 16000, 25000];

const SEGMENT_MS = 90000;

function setMode(m) {
  mode = m;
  document.getElementById('tab-consulta').className = 'mode-tab' + (m==='consulta'?' active':'');
  document.getElementById('tab-dictado').className = 'mode-tab' + (m==='dictado'?' active':'');
}

function getSettings() {
  return {
    anthropic: localStorage.getItem('cr_anthropic') || '',
    openai: localStorage.getItem('cr_openai') || '',
    method: localStorage.getItem('cr_method') || 'whisper',
    promptConsulta: localStorage.getItem('cr_prompt_consulta') || document.getElementById('cfgPromptConsulta').value,
    promptDictado: localStorage.getItem('cr_prompt_dictado') || document.getElementById('cfgPromptDictado').value,
    diccionario: localStorage.getItem('cr_diccionario') || '',
  };
}

function openSettings() {
  const s = getSettings();
  document.getElementById('cfgAnthropic').value = s.anthropic;
  document.getElementById('cfgOpenai').value = s.openai;
  document.getElementById('cfgMethod').value = s.method;
  document.getElementById('cfgPromptConsulta').value = s.promptConsulta;
  document.getElementById('cfgPromptDictado').value = s.promptDictado;
  document.getElementById('cfgDiccionario').value = s.diccionario;
  onMethodChange();
  document.getElementById('overlay').classList.add('open');
}

function onMethodChange() {
  const m = document.getElementById('cfgMethod').value;
  document.getElementById('openaiField').style.display = m === 'whisper' ? 'block' : 'none';
}

function saveSettings() {
  localStorage.setItem('cr_anthropic', document.getElementById('cfgAnthropic').value.trim());
  localStorage.setItem('cr_openai', document.getElementById('cfgOpenai').value.trim());
  localStorage.setItem('cr_method', document.getElementById('cfgMethod').value);
  localStorage.setItem('cr_prompt_consulta', document.getElementById('cfgPromptConsulta').value);
  localStorage.setItem('cr_prompt_dictado', document.getElementById('cfgPromptDictado').value);
  localStorage.setItem('cr_diccionario', document.getElementById('cfgDiccionario').value);
  document.getElementById('overlay').classList.remove('open');
  showToast('Configuración guardada');
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

function resetPrompts() {
  localStorage.removeItem('cr_prompt_consulta');
  localStorage.removeItem('cr_prompt_dictado');
  // Recargar defaults del HTML en los campos
  document.getElementById('cfgPromptConsulta').value = document.getElementById('cfgPromptConsulta').defaultValue;
  document.getElementById('cfgPromptDictado').value = document.getElementById('cfgPromptDictado').defaultValue;
  showToast('Prompts restaurados por defecto');
}

function setStatus(text, cls) {
  const p = document.getElementById('statusPill');
  p.textContent = text;
  p.className = 'status-pill status-' + cls;
}

function updateTimer() {
  if (!isPaused) {
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    document.getElementById('timer').textContent = m+':'+s;
  }
}

async function acquireWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wlDot').className = 'wl-dot on';
      document.getElementById('wlLabel').textContent = 'PANTALLA ACTIVA: ON';
      wakeLock.addEventListener('release', () => {
        document.getElementById('wlDot').className = 'wl-dot';
        document.getElementById('wlLabel').textContent = 'PANTALLA ACTIVA: LIBERADO';
      });
    } catch(e) {
      document.getElementById('wlLabel').textContent = 'PANTALLA ACTIVA: NO DISPONIBLE';
    }
  } else {
    document.getElementById('wlLabel').textContent = 'PANTALLA ACTIVA: NO SOPORTADO';
  }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  document.getElementById('wlDot').className = 'wl-dot';
  document.getElementById('wlLabel').textContent = 'PANTALLA ACTIVA: INACTIVO';
}

function startLevelMeter() {
  if (!stream) return;
  audioContext = new AudioContext();
  const src = audioContext.createMediaStreamSource(stream);
  analyserNode = audioContext.createAnalyser();
  analyserNode.fftSize = 64;
  src.connect(analyserNode);
  const buf = new Uint8Array(analyserNode.frequencyBinCount);
  function draw() {
    animFrame = requestAnimationFrame(draw);
    analyserNode.getByteFrequencyData(buf);
    const step = Math.floor(buf.length / N_BARS);
    bars.forEach((b, i) => {
      const val = buf[i * step] || 0;
      const h = Math.max(4, Math.min(56, val * 0.55));
      b.style.height = h + 'px';
      b.className = 'viz-bar' + (val > 20 ? ' active' : '');
    });
  }
  draw();
}

function stopLevelMeter() {
  if (animFrame) cancelAnimationFrame(animFrame);
  if (audioContext) { audioContext.close(); audioContext = null; }
  bars.forEach(b => { b.style.height = '4px'; b.className = 'viz-bar'; });
}

async function startRec() {
  const settings = getSettings();
  if (!settings.anthropic) {
    openSettings();
    showToast('Configurá las API Keys primero');
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: true, sampleRate: 16000 }, video: false });
  } catch(e) {
    showToast('Sin acceso al micrófono');
    return;
  }

  // Cancelar reintentos pendientes de sesión anterior
  Object.values(segRetryTimers).forEach(t => clearTimeout(t));
  segRetryTimers = {};
  transcriptionText = '';
  segments = [];
  segmentCount = 0;
  allChunks = [];
  audioChunks = [];
  setTranscription('', true);
  setHcop('', true);
  document.getElementById('calcsWrap').style.display = 'none';
  document.getElementById('segmentsWrap').style.display = 'none';
  document.getElementById('segList').innerHTML = '';
  seconds = 0;
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('btnAnalyze').disabled = true;

  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnPause').disabled = false;
  document.getElementById('btnStop').disabled = false;
  isRecording = true;
  isPaused = false;
  setStatus('GRABANDO', 'recording');
  timerInterval = setInterval(updateTimer, 1000);
  await acquireWakeLock();
  startLevelMeter();

  const method = settings.method;
  if (method === 'native') {
    startNative();
  } else {
    startWhisperRecorder();
  }
}

function startWhisperRecorder() {
  const opts = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? { mimeType: 'audio/webm;codecs=opus' } : {};
  mediaRecorder = new MediaRecorder(stream, opts);
  mediaRecorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) { audioChunks.push(e.data); allChunks.push(e.data); }
  };
  mediaRecorder.start(1000);

  segmentInterval = setInterval(async () => {
    if (!isPaused && audioChunks.length > 0) {
      const blob = new Blob([...audioChunks], { type: mediaRecorder.mimeType || 'audio/webm' });
      audioChunks = [];
      segmentCount++;
      await transcribeSegment(blob, segmentCount);
    }
  }, SEGMENT_MS);
}

function startNative() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Web Speech no disponible. Usá Chrome.'); return; }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'es-AR';
  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) transcriptionText += applyDiccionario(e.results[i][0].transcript) + ' ';
      else interim += e.results[i][0].transcript;
    }
    setTranscription(transcriptionText + (interim ? ' ' + interim : ''));
    runCalcs(transcriptionText);
    document.getElementById('btnAnalyze').disabled = transcriptionText.trim().length < 5;
  };
  recognition.onend = () => { if (isRecording && !isPaused) recognition.start(); };
  recognition.start();
  mediaRecorder = new MediaRecorder(stream, {});
  mediaRecorder.ondataavailable = e => { if(e.data.size>0) allChunks.push(e.data); };
  mediaRecorder.start(1000);
}

function togglePause() {
  if (!isPaused) {
    isPaused = true;
    setStatus('PAUSADO', 'paused');
    document.getElementById('btnPause').textContent = '▶';
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.pause();
    if (recognition) recognition.stop();
    releaseWakeLock();
  } else {
    isPaused = false;
    setStatus('GRABANDO', 'recording');
    document.getElementById('btnPause').textContent = '⏸';
    if (mediaRecorder && mediaRecorder.state === 'paused') mediaRecorder.resume();
    if (recognition) recognition.start();
    acquireWakeLock();
  }
}

async function stopRec() {
  isRecording = false;
  isPaused = false;
  clearInterval(timerInterval);
  clearInterval(segmentInterval);
  releaseWakeLock();
  stopLevelMeter();
  setStatus('PROCESANDO', 'processing');

  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnPause').disabled = true;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnPause').textContent = '⏸';

  if (recognition) { recognition.stop(); recognition = null; }
  if (mediaRecorder && (mediaRecorder.state === 'recording' || mediaRecorder.state === 'paused')) {
    await new Promise(r => { mediaRecorder.onstop = r; mediaRecorder.stop(); });
  }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

  const settings = getSettings();
  if (settings.method === 'whisper') {
    await new Promise(r => setTimeout(r, 500));
    // Si ya hubo segmentos intermedios, transcribir solo los chunks restantes (no reenviar todo)
    const chunksToSend = audioChunks.length > 0 ? audioChunks : allChunks;
    const isFinal = segmentCount === 0; // solo reemplaza si no hubo segmentos previos
    const finalBlob = new Blob(chunksToSend, { type: mediaRecorder?.mimeType || 'audio/webm' });
    if (finalBlob.size > 2000) {
      segmentCount++;
      await transcribeSegment(finalBlob, segmentCount, isFinal);
    }
  }

  setStatus('LISTO', 'idle');
  document.getElementById('btnAnalyze').disabled = transcriptionText.trim().length < 5;
}

function addSegmentUI(num, status) {
  document.getElementById('segmentsWrap').style.display = 'block';
  const div = document.createElement('div');
  div.className = 'seg-item';
  div.id = 'seg-' + num;
  div.innerHTML = `<span class="seg-num">#${num}</span><span class="seg-text" id="seg-txt-${num}">Transcribiendo...</span><span class="seg-status seg-pending" id="seg-st-${num}">...</span>`;
  document.getElementById('segList').appendChild(div);
  document.getElementById('segList').scrollTop = 99999;
}

function updateSegmentUI(num, text, status) {
  const txt = document.getElementById('seg-txt-' + num);
  const st = document.getElementById('seg-st-' + num);
  if (txt) txt.textContent = text.slice(0,60) + (text.length>60?'…':'');
  if (st) {
    const map = { ok: ['OK','seg-ok'], error: ['ERROR','seg-error'], retry: ['REINTENTANDO','seg-retry'] };
    const [label, cls] = map[status] || ['...','seg-pending'];
    st.textContent = label;
    st.className = 'seg-status ' + cls;
  }
}

async function transcribeSegment(blob, num, isFinal, retryCount) {
  retryCount = retryCount || 0;
  const settings = getSettings();
  if (!settings.openai) { showToast('Falta API Key de OpenAI'); return; }

  if (retryCount === 0) addSegmentUI(num);
  else updateSegmentUI(num, `reintentando (#${retryCount})...`, 'retry');

  try {
    const fd = new FormData();
    fd.append('file', blob, 'audio.webm');
    fd.append('model', 'whisper-1');
    fd.append('language', 'es');
    const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + settings.openai },
      body: fd
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || 'HTTP ' + res.status);
    }
    const data = await res.json();
    if (data.text) {
      const corrected = applyDiccionario(data.text);
      if (isFinal) transcriptionText = corrected;
      else transcriptionText += (transcriptionText ? ' ' : '') + corrected;
      setTranscription(transcriptionText);
      runCalcs(transcriptionText);
      updateSegmentUI(num, corrected, 'ok');
      document.getElementById('btnAnalyze').disabled = transcriptionText.trim().length < 5;
    } else {
      throw new Error(data.error?.message || 'respuesta vacía');
    }
  } catch(e) {
    if (retryCount < MAX_RETRIES) {
      const delay = RETRY_DELAYS[retryCount];
      updateSegmentUI(num, `error — reintento en ${Math.round(delay/1000)}s`, 'retry');
      segRetryTimers[num] = setTimeout(() => {
        transcribeSegment(blob, num, isFinal, retryCount + 1);
      }, delay);
    } else {
      updateSegmentUI(num, 'error: ' + e.message, 'error');
      showToast('Seg #' + num + ': falló tras ' + MAX_RETRIES + ' intentos');
    }
  }
}

async function analyzeWithClaude() {
  const settings = getSettings();
  if (!settings.anthropic) { openSettings(); return; }
  const text = transcriptionText.trim();
  if (!text) return;
  const prompt = mode === 'consulta' ? settings.promptConsulta : settings.promptDictado;

  setHcop('Procesando con Claude...', false, true);
  document.getElementById('btnAnalyze').disabled = true;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': settings.anthropic,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{ role: 'user', content: prompt + '\n\nTRANSCRIPCIÓN:\n' + text }]
      })
    });
    const data = await res.json();
    if (data.content?.[0]?.text) {
      setHcop(data.content[0].text);
    } else {
      setHcop('Error: ' + (data.error?.message || 'respuesta vacía'));
    }
  } catch(e) {
    setHcop('Error de conexión: ' + e.message);
  }
  document.getElementById('btnAnalyze').disabled = false;
}

function setTranscription(text, empty) {
  const el = document.getElementById('transcBox');
  if (empty || !text) { el.textContent = 'La transcripción aparecerá aquí...'; el.className = 'text-box empty'; }
  else { el.textContent = text; el.className = 'text-box'; el.scrollTop = el.scrollHeight; }
}

function setHcop(text, empty, loading) {
  const el = document.getElementById('hcopBox');
  if (empty || !text) { el.textContent = 'El HCOP generado por Claude aparecerá aquí...'; el.className = 'hcop-box empty'; }
  else if (loading) { el.textContent = text; el.className = 'hcop-box loading'; }
  else { el.textContent = text; el.className = 'hcop-box'; }
}

function clearHcop() { setHcop('', true); }

function copyText(id) {
  const el = document.getElementById(id);
  if (el.className.includes('empty') || el.className.includes('loading')) return;
  navigator.clipboard.writeText(el.textContent).then(() => showToast('Copiado al portapapeles'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── DICCIONARIO FONÉTICO ────────────────────────────────────────
function applyDiccionario(text) {
  const raw = localStorage.getItem('cr_diccionario') || '';
  const lines = raw.split('\n').filter(l => l.trim());
  let result = text;
  for (const line of lines) {
    const sep = line.includes('→') ? '→' : ':';
    const parts = line.split(sep);
    if (parts.length >= 2) {
      const wrong = parts[0].trim();
      const correct = parts.slice(1).join(sep).trim();
      if (wrong) {
        try {
          result = result.replace(new RegExp('\\b' + wrong + '\\b', 'gi'), correct);
        } catch(e) {}
      }
    }
  }
  return result;
}

// ─── CÁLCULOS AUTOMÁTICOS ────────────────────────────────────────
function extractClinicalValues(text) {
  const t = text;
  const vals = {};

  // Peso (kg)
  const pesoM = t.match(/(?:peso[:\s]+|pesa\s+)(\d+(?:[.,]\d+)?)\s*(?:kg|kilos?)?/i)
             || t.match(/(\d{2,3}(?:[.,]\d+)?)\s*(?:kg|kilos?)/i);
  if (pesoM) vals.peso = parseFloat(pesoM[1].replace(',', '.'));

  // Talla (cm o metros)
  const tallaM = t.match(/(?:talla[:\s]+|mide\s+|altura[:\s]+)(\d+(?:[.,]\d+)?)\s*(?:cm|metros?|m\b)?/i);
  if (tallaM) {
    let v = parseFloat(tallaM[1].replace(',', '.'));
    if (v < 3) v = v * 100; // metros → cm
    vals.talla = v;
  }

  // TA / PA  (ej: "TA 130/80", "tensión 130/80", "PA 130-80")
  const taM = t.match(/(?:t\.?a\.?|p\.?a\.?|tens[ií]on|presi[oó]n)\s*(?:arterial)?\s*[:de]?\s*(\d{2,3})\s*[\/\-]\s*(\d{2,3})/i)
           || t.match(/(\d{2,3})\s*[\/\-]\s*(\d{2,3})\s*(?:de\s+tensi[oó]n|mmhg)/i);
  if (taM) { vals.tas = parseInt(taM[1]); vals.tad = parseInt(taM[2]); }

  // Cintura
  const cintM = t.match(/cintura[:\s]+(\d+(?:[.,]\d+)?)\s*(?:cm)?/i)
             || t.match(/per[íi]metro\s+abdominal[:\s]+(\d+(?:[.,]\d+)?)/i);
  if (cintM) vals.cintura = parseFloat(cintM[1].replace(',', '.'));

  // Cadera
  const cadM = t.match(/cadera[:\s]+(\d+(?:[.,]\d+)?)\s*(?:cm)?/i);
  if (cadM) vals.cadera = parseFloat(cadM[1].replace(',', '.'));

  // Creatinina (mg/dL)
  const creatM = t.match(/creatinina[:\s]+(\d+(?:[.,]\d+)?)/i);
  if (creatM) vals.creat = parseFloat(creatM[1].replace(',', '.'));

  // Edad
  const edadM = t.match(/(\d+)\s*a[ñn]os?/i);
  if (edadM) vals.edad = parseInt(edadM[1]);

  // Sexo (default masculino si no se detecta)
  vals.esFemenino = /(?:femenin[ao]|mujer|se[ñn]ora|paciente\s+(?:de\s+sexo\s+)?f\b)/i.test(text);

  return vals;
}

function badgeCard(name, valStr, unit, badgeLabel, badgeCls) {
  return `<div class="calc-card">
    <div class="calc-name">${name}</div>
    <div class="calc-val">${valStr}<span class="calc-unit">${unit}</span></div>
    <div class="calc-badge ${badgeCls}">${badgeLabel}</div>
  </div>`;
}

function runCalcs(text) {
  if (!text || text.trim().length < 10) {
    document.getElementById('calcsWrap').style.display = 'none';
    return;
  }
  const v = extractClinicalValues(text);
  const cards = [];

  // IMC
  if (v.peso && v.talla) {
    const tallaM = v.talla / 100;
    const imc = v.peso / (tallaM * tallaM);
    const [lbl, cls] = imc < 18.5 ? ['Bajo peso','badge-warn']
      : imc < 25 ? ['Normal','badge-ok']
      : imc < 30 ? ['Sobrepeso','badge-warn']
      : imc < 35 ? ['Obesidad I','badge-alert']
      : imc < 40 ? ['Obesidad II','badge-alert']
      : ['Obesidad III','badge-alert'];
    cards.push(badgeCard('IMC', imc.toFixed(1), ' kg/m²', lbl, cls));
  }

  // PP y PAM
  if (v.tas && v.tad && v.tas > v.tad) {
    const pp = v.tas - v.tad;
    const pam = Math.round(v.tad + pp / 3);
    cards.push(badgeCard('PRESIÓN DE PULSO', pp, ' mmHg',
      pp >= 60 ? '↑ Elevada' : 'Normal',
      pp >= 60 ? 'badge-warn' : 'badge-ok'));
    cards.push(badgeCard('PAM', pam, ' mmHg',
      pam < 70 ? '↓ Baja' : pam > 100 ? '↑ Alta' : 'Normal',
      pam < 70 || pam > 100 ? 'badge-warn' : 'badge-ok'));
  }

  // Cintura/cadera y cintura/talla
  if (v.cintura && v.cadera) {
    const cc = v.cintura / v.cadera;
    const limCC = v.esFemenino ? 0.85 : 0.90;
    cards.push(badgeCard('CINTURA / CADERA', cc.toFixed(2), '',
      cc > limCC ? '↑ Riesgo CV' : 'Normal',
      cc > limCC ? 'badge-alert' : 'badge-ok'));
  }
  if (v.cintura && v.talla) {
    const ct = v.cintura / v.talla;
    cards.push(badgeCard('CINTURA / TALLA', ct.toFixed(2), '',
      ct > 0.5 ? '↑ Riesgo' : 'OK',
      ct > 0.5 ? 'badge-warn' : 'badge-ok'));
  }

  // CKD-EPI 2021 (race-free)
  if (v.creat && v.edad) {
    const kappa = v.esFemenino ? 0.7 : 0.9;
    const alpha = v.esFemenino ? -0.241 : -0.302;
    const ratio = v.creat / kappa;
    const egfr = Math.round(
      142 * Math.pow(Math.min(ratio,1), alpha) *
      Math.pow(Math.max(ratio,1), -1.200) *
      Math.pow(0.9938, v.edad) * (v.esFemenino ? 1.012 : 1)
    );
    const [lbl, cls] = egfr >= 90 ? ['G1 — Normal','badge-ok']
      : egfr >= 60 ? ['G2 — Leve','badge-ok']
      : egfr >= 45 ? ['G3a','badge-warn']
      : egfr >= 30 ? ['G3b','badge-warn']
      : egfr >= 15 ? ['G4 — Grave','badge-alert']
      : ['G5 — Fallo renal','badge-alert'];
    cards.push(badgeCard('eGFR (CKD-EPI)', egfr, ' ml/min', lbl, cls));
  }

  const wrap = document.getElementById('calcsWrap');
  const grid = document.getElementById('calcsGrid');
  if (cards.length > 0) {
    grid.innerHTML = cards.join('');
    wrap.style.display = 'block';
  } else {
    wrap.style.display = 'none';
  }
}

// ─── COMPARTIR HCOP ──────────────────────────────────────────────
function shareHCOP(method) {
  const el = document.getElementById('hcopBox');
  if (el.className.includes('empty') || el.className.includes('loading')) {
    showToast('Generá el HCOP primero');
    return;
  }
  const text = el.textContent;
  if (method === 'whatsapp') {
    window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
  } else {
    window.location.href = 'mailto:?subject=Historia%20Cl%C3%ADnica&body=' + encodeURIComponent(text);
  }
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && isRecording && !isPaused && !wakeLock) {
    await acquireWakeLock();
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
